# Adapted from https://github.com/TYPO3GmbH/blog/blob/master/.github/workflows/ci.yml
name: CI

on:
    push:
        branches: [TYPO3_12]
    pull_request:
        branches: [TYPO3_12]

jobs:
    build:
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                typo3: [ '^12.4' ]
                php: [ '8.1', '8.2', '8.3', '8.4' ]

        steps:
            -   id: checkout
                name: Checkout
                uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            -   id: setup_php
                name: Set up PHP version ${{ matrix.php }}
                uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2.37.0
                with:
                    php-version: ${{ matrix.php }}
                    tools: composer:v2, php-cs-fixer

            -   name: Validate composer.json and composer.lock
                run: composer validate

            -   id: security
                name: Security audit
                if: ${{ always() && steps.install.conclusion == 'success' }}
                run: |
                    composer audit

            -   id: composer-cache-vars
                name: Composer Cache Vars
                run: |
                    echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
                    echo "timestamp=$(date +"%s")" >> $GITHUB_OUTPUT

            -   id: composer-cache-dependencies
                name: Cache Composer dependencies
                uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
                with:
                    path: ${{ steps.composer-cache-vars.outputs.dir }}
                    key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ matrix.typo3 }}-${{ steps.composer-cache-vars.outputs.timestamp }}
                    restore-keys: |
                        ${{ runner.os }}-composer-${{ matrix.php }}-${{ matrix.typo3 }}-
                        ${{ runner.os }}-composer-${{ matrix.php }}-
                        ${{ runner.os }}-composer-

            -   id: install
                name: Install dependencies with typo3/cms-core:${{ matrix.typo3 }}
                run: |
                    composer require typo3/cms-core:${{ matrix.typo3 }} --no-progress --no-update
                    composer require typo3/cms-backend:${{ matrix.typo3 }} --no-progress --no-update
                    composer require typo3/cms-extbase:${{ matrix.typo3 }} --no-progress --no-update
                    composer require typo3/cms-extensionmanager:${{ matrix.typo3 }} --no-progress --no-update
                    composer require typo3/cms-frontend:${{ matrix.typo3 }} --no-progress --no-update
                    composer require typo3/cms-rte-ckeditor:${{ matrix.typo3 }} --no-progress --no-update
                    composer install
                    git checkout composer.json

            -   id: lint
                name: Lint
                if: ${{ always() && steps.install.conclusion == 'success' }}
                run: |
                    composer ci:test:php:lint

            -   id: generate-php-cs-fixer-config
                name: Generate .php-cs-fixer.php
                if: ${{ always() && steps.install.conclusion == 'success' }}
                run: |
                    cp Build/.php-cs-fixer.dist.php .php-cs-fixer.php

            -   id: cgl
                name: CGL
                if: ${{ always() && steps.install.conclusion == 'success' }}
                env:
                    PHP_CS_FIXER_IGNORE_ENV: true
                run: |
                    php-cs-fixer fix --dry-run --verbose --config Build/.php-cs-fixer.dist.php

            -   id: phpstan
                name: PHPStan
                if: ${{ always() && steps.install.conclusion == 'success' }}
                run: |
                    composer ci:test:php:phpstan -- --error-format=github

            -   id: rector
                name: Rector
                if: ${{ always() && steps.install.conclusion == 'success' }}
                run: |
                    composer ci:test:php:rector

            -   id: functional
                name: Functional Tests
                if: ${{ always() && steps.install.conclusion == 'success' }}
                env:
                    typo3DatabaseDriver: pdo_sqlite
                run: |
                    composer ci:test:php:functional

            -   id: coverage
                name: Generate Coverage Report
                if: ${{ always() && steps.functional.conclusion == 'success' && matrix.php == '8.2' }}
                env:
                    typo3DatabaseDriver: pdo_sqlite
                run: |
                    composer ci:coverage:functional

            -   id: upload-coverage
                name: Upload Coverage to Codecov
                if: ${{ always() && steps.coverage.conclusion == 'success' && matrix.php == '8.2' }}
                uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5.5.3
                with:
                    files: .Build/logs/clover.xml
                    fail_ci_if_error: false

    build-summary:
        name: "Build ✓"
        if: always()
        needs: [build]
        runs-on: ubuntu-latest
        steps:
            - name: Check build matrix status
              run: |
                  if [ "${{ needs.build.result }}" != "success" ]; then
                    echo "Build matrix failed"
                    exit 1
                  fi
